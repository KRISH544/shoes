name: Discord Sneaker Monitor

on:
  workflow_dispatch:
    inputs:
      send_test_alert:
        description: "Send a Discord test message"
        required: false
        default: "false"
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Restore monitor state
        uses: actions/cache/restore@v4
        with:
          path: .monitor-state
          key: sneaker-monitor-${{ github.run_id }}
          restore-keys: |
            sneaker-monitor-

      - name: Run monitor
        run: node scripts/discord-monitor.mjs
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MONITOR_STATE_PATH: .monitor-state/seen.json
          SEND_TEST_ALERT: ${{ github.event.inputs.send_test_alert || 'false' }}

      - name: Save monitor state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .monitor-state
          key: sneaker-monitor-${{ github.run_id }}
